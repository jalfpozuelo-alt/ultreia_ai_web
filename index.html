<!-- PATH: web/index.html -->
<!DOCTYPE html>
<html>
<head>
  <!-- 
    Base HREF dinámico: El compilador de Flutter inyectará la ruta del repositorio
    basándose en el flag --base-href del script de despliegue.
  -->
  <base href="/ultreia_ai_web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="App de asistencia para el peregrino con IA - Proyecto ULTRE.IA">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ultreia_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ultreia AI</title>
  <link rel="manifest" href="manifest.json">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background-color: #041E42; /* Color oficial segun pubspec */
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .loader {
      border: 8px solid #f3f3f3;
      border-radius: 50%;
      border-top: 8px solid #FFCD00; /* Amarillo oficial segun pubspec */
      width: 60px;
      height: 60px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="loader"></div>
  </div>

  <!-- 
    Carga del Bootstrap: Esta es la nueva arquitectura requerida para evitar
    el error de buildConfig en versiones modernas de Flutter Web.
  -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Limpieza agresiva de Service Workers antiguos para forzar la nueva version
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      });
    }
  </script>
</body>
</html>
